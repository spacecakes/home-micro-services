x-common: &common
  restart: unless-stopped

services:
  # Rack UPS monitoring (APC NMC via SNMP, monitor-only — shutdown handled by NUT on Proxmox)
  apcupsd:
    <<: *common
    container_name: apcupsd
    image: apcupsd:latest
    build: ./apcupsd
    environment:
      - UPS_DEVICE=10.0.1.5
    ports:
      - '3551:3551'
    labels:
      - 'traefik.enable=false'

  # Desktop UPS monitoring (monitor-only, no host shutdown)
  apcupsd2:
    <<: *common
    container_name: apcupsd2
    image: apcupsd:latest
    build: ./apcupsd
    environment:
      - UPS_DEVICE=10.0.1.6
    ports:
      - '3552:3551'
    labels:
      - 'traefik.enable=false'

  ops-toolbox:
    <<: *common
    container_name: ops-toolbox
    image: ops-toolbox:latest
    build: ./ops-toolbox
    command: /bin/sh -c "(echo '0 * * * * curl -sX POST http://localhost:8000/backup/run'; echo '0 2 * * * curl -sX POST http://localhost:8000/proxmox/run') | crontab - && crond -l 2 && python3 /app/app.py"
    environment:
      UPS_HOSTS: apcupsd,apcupsd2
      BACKUP_SRC: /source/
      BACKUP_DST: /destination/docker/
      BACKUP_EXCLUDES: '.git/,temp/,downloads/,.DS_Store,._*,@eaDir,logs/,Logs/'
      PVE_HOST: root@10.0.1.3
      PVE_SSH_KEY: /app/ssh/id_ed25519
      PVE_DST: /destination/pve-host/
      PVE_SRCS: /etc/pve/,/etc/nut/
    networks:
      - default
      - traefik-proxy
    volumes:
      - /srv/docker:/source
      - nfs-backup-docker:/destination
      - /srv/docker/stack-ops/data/ssh:/app/ssh:ro
      - /srv/docker/stack-ops/ops-toolbox/app.py:/app/app.py:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - 'traefik.http.routers.ops.rule=Host(`ops.lundmark.tech`)'
      - 'traefik.http.routers.ops.middlewares=authelia@file'
      - 'traefik.http.services.ops.loadbalancer.server.port=8000'
      - 'traefik.docker.network=traefik-proxy'

  watchtower:
    <<: *common
    container_name: watchtower
    image: containrrr/watchtower:latest
    environment:
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
    labels:
      - 'traefik.enable=false'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # LAN bandwidth testing server (connect with: iperf3 -c <server-ip>)
  iperf3:
    <<: *common
    restart: 'no'
    container_name: iperf3
    image: networkstatic/iperf3:latest
    command: -s
    ports:
      - '5201:5201'
    labels:
      - 'traefik.enable=false'

  # Video encoder & converter
  handbrake:
    <<: *common
    restart: 'no'
    container_name: handbrake
    image: lscr.io/linuxserver/handbrake:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Stockholm
    devices:
      - /dev/dri:/dev/dri
    networks:
      - default
      - traefik-proxy
    labels:
      - 'traefik.docker.network=traefik-proxy'
      - 'traefik.http.routers.handbrake.rule=Host(`encoder.lundmark.tech`)'
      - 'traefik.http.routers.handbrake.middlewares=authelia@file'
      - 'traefik.http.services.handbrake.loadbalancer.server.port=3000'
    volumes:
      - /srv/docker/stack-ops/data/handbrake:/config
      - nfs-media:/media:ro
      - /srv/docker/temp/handbrake:/output

  # HTML5 internet speed test
  openspeedtest:
    <<: *common
    restart: 'no'
    container_name: openspeedtest
    image: openspeedtest/latest:latest
    networks:
      - default
      - traefik-proxy
    labels:
      - 'traefik.http.routers.openspeedtest.rule=Host(`speedtest.lundmark.tech`)'
      - 'traefik.http.routers.openspeedtest.middlewares=authelia@file'
      - 'traefik.http.services.openspeedtest.loadbalancer.server.port=3000'
      - 'traefik.docker.network=traefik-proxy'

volumes:
  nfs-backup-docker:
    driver: local
    driver_opts:
      type: nfs
      o: 'addr=10.0.1.2,soft,timeo=50,vers=4.1,noatime'
      device: ':/volume1/backup-homeserver'
  nfs-media:
    driver: local
    driver_opts:
      type: nfs
      o: 'addr=10.0.1.2,soft,timeo=50,vers=4.1,noatime'
      device: ':/volume1/media'

networks:
  traefik-proxy:
    external: true
