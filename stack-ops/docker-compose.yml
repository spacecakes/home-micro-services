x-common: &common
  restart: unless-stopped

services:
  config-backup:
    <<: *common
    container_name: config-backup
    image: config-backup:latest
    build: ./config-backup
    command: /bin/sh -c "echo '0 2 * * * curl -sX POST http://localhost:8000/backup/pve' | crontab - && crond -l 2 && python3 /app/app.py"
    environment:
      # Backup root (NFS mount)
      BACKUP_DST: /destination
      # PVE host config (rsync over SSH)
      PVE_HOST: root@10.0.1.3
      PVE_SSH_KEY: /app/ssh/id_ed25519
      PVE_DIR: pve-host
      PVE_SRCS: /etc/pve/,/etc/nut/,/etc/fstab,/etc/network/interfaces,/etc/modprobe.d/,/etc/modules,/etc/sysctl.d/,/etc/apt/sources.list.d/,/root/.claude/
      # UPS NMC config (FTP, manual backup only)
      NMC_HOSTS: 'rack-ups:10.0.1.5,desktop-ups:10.0.1.6'
      NMC_USER: apc
      NMC_PASS: ${NMC_PASS}
      NMC_DIR: apc-ups
    networks:
      - default
      - traefik-proxy
    volumes:
      - nfs-backup-nodes:/destination
      - /srv/docker/stack-ops/data/ssh:/app/ssh:ro
      - /srv/docker/stack-ops/config-backup/app.py:/app/app.py:ro
    labels:
      - 'traefik.http.routers.config-backup.rule=Host(`ops.lundmark.tech`)'
      - 'traefik.http.routers.config-backup.middlewares=authelia@file'
      - 'traefik.http.services.config-backup.loadbalancer.server.port=8000'
      - 'traefik.docker.network=traefik-proxy'

  watchtower:
    <<: *common
    container_name: watchtower
    image: containrrr/watchtower:latest
    environment:
      - WATCHTOWER_CLEANUP=true
      - DOCKER_API_VERSION=1.44
    labels:
      - 'traefik.enable=false'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  nfs-backup-nodes:
    driver: local
    driver_opts:
      type: nfs
      o: 'addr=10.0.1.2,soft,timeo=50,vers=4.1,noatime'
      device: ':/volume1/backup-nodes'

networks:
  traefik-proxy:
    external: true
