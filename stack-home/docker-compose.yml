x-common: &common
  network_mode: host
  restart: unless-stopped

services:
  homebridge:
    <<: *common
    container_name: homebridge
    hostname: homebridge
    image: homebridge/homebridge:latest
    environment:
      - TZ=Europe/Stockholm
    labels:
      - 'traefik.http.services.homebridge.loadbalancer.server.port=8581'
    volumes:
      - /srv/docker/stack-home/data/homebridge:/homebridge

